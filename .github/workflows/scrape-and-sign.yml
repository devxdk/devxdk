# Refresh + rebuild every component manifest and sign it, daily and on demand.
#
# Full transaction per run (reset to the live tip and replay on a push race):
#   apply_revocations -> apply_pending -> scrape -> validate_manifests -> sign
# so a concurrently-committed pending record, revocation, or provider-epoch bump
# is never overwritten by replayed stale output. The manifests, both state files,
# and the .minisig signatures land in ONE commit, so the committed state is never
# signature-invalid.
#
# Secrets live in the main-only `manifest-release` environment (W3), never
# repo-level: MINISIGN_SECRET_KEY (the manifest trust root), DEVXDK_SIGNER_TOKEN
# (read access to the private app repo for the signer + allowlist), and
# DEVXDK_MANIFEST_PUSH_TOKEN (the fine-grained PAT that pushes — never
# GITHUB_TOKEN, which no ruleset grants a bypass).

name: scrape-and-sign

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_resign:
        description: "Re-sign every manifest (key rotation)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: scrape-and-sign
  cancel-in-progress: false

jobs:
  scrape-and-sign:
    runs-on: ubuntu-latest
    environment: manifest-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "stable"

      - name: Resolve the pinned signer commit
        id: pin
        run: echo "sha=$(grep -oE '[0-9a-f]{40}' config/signer-source.pin | head -1)" >> "$GITHUB_OUTPUT"

      - name: Checkout the pinned signer source (private app repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: devxdk/devxdkcode
          ref: ${{ steps.pin.outputs.sha }}
          token: ${{ secrets.DEVXDK_SIGNER_TOKEN }}
          path: app-src

      - name: Build the signer (cmd/devxdk-mansign)
        working-directory: app-src
        run: go build -trimpath -o "$RUNNER_TEMP/devxdk-mansign" ./cmd/devxdk-mansign

      - name: Rebuild, validate, sign, and push (full-transaction retry)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MANIFEST_PUSH_TOKEN: ${{ secrets.DEVXDK_MANIFEST_PUSH_TOKEN }}
          FORCE_RESIGN: ${{ github.event.inputs.force_resign }}
          MANSIGN: ${{ runner.temp }}/devxdk-mansign
          ALLOWLIST_GO: app-src/internal/download/allowlist.go
        run: bash scripts/ci/scrape-sign-push.sh
