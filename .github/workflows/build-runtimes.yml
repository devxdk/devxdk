    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'php-windows-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: php-windows-amd64
      runner: windows-2022
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['php-windows-amd64']) }}

  leg-postgres-darwin-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'postgres-darwin-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: postgres-darwin-amd64
      runner: macos-15-intel
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['postgres-darwin-amd64']) }}

  leg-postgres-darwin-arm64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'postgres-darwin-arm64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: postgres-darwin-arm64
      runner: macos-15
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['postgres-darwin-arm64']) }}

  leg-postgres-linux-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'postgres-linux-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: postgres-linux-amd64
      runner: ubuntu-22.04
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['postgres-linux-amd64']) }}

  leg-postgres-windows-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'postgres-windows-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: postgres-windows-amd64
      runner: windows-2022
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['postgres-windows-amd64']) }}

  leg-python-darwin-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'python-darwin-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: python-darwin-amd64
      runner: macos-15-intel
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['python-darwin-amd64']) }}

  leg-python-darwin-arm64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'python-darwin-arm64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: python-darwin-arm64
      runner: macos-15
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['python-darwin-arm64']) }}

  leg-python-linux-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'python-linux-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: python-linux-amd64
      runner: ubuntu-22.04
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['python-linux-amd64']) }}

  leg-python-windows-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'python-windows-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: python-windows-amd64
      runner: windows-2022
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['python-windows-amd64']) }}

  leg-redis-darwin-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'redis-darwin-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: redis-darwin-amd64
      runner: macos-15-intel
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['redis-darwin-amd64']) }}

  leg-redis-darwin-arm64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'redis-darwin-arm64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: redis-darwin-arm64
      runner: macos-15
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['redis-darwin-arm64']) }}

  leg-redis-linux-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'redis-linux-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: redis-linux-amd64
      runner: ubuntu-22.04
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['redis-linux-amd64']) }}

  leg-redis-windows-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'redis-windows-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: redis-windows-amd64
      runner: windows-2022
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['redis-windows-amd64']) }}

  leg-valkey-darwin-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'valkey-darwin-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: valkey-darwin-amd64
      runner: macos-15-intel
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['valkey-darwin-amd64']) }}

  leg-valkey-darwin-arm64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'valkey-darwin-arm64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: valkey-darwin-arm64
      runner: macos-15
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['valkey-darwin-arm64']) }}

  leg-valkey-linux-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'valkey-linux-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: valkey-linux-amd64
      runner: ubuntu-22.04
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['valkey-linux-amd64']) }}

  leg-valkey-windows-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'valkey-windows-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: valkey-windows-amd64
      runner: windows-2022
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['valkey-windows-amd64']) }}

  publish:
    needs:
      - plan
      - leg-nginx-darwin-amd64
      - leg-nginx-darwin-arm64
      - leg-nginx-linux-amd64
      - leg-php-darwin-amd64
      - leg-php-darwin-arm64
      - leg-php-linux-amd64
      - leg-php-windows-amd64
      - leg-postgres-darwin-amd64
      - leg-postgres-darwin-arm64
      - leg-postgres-linux-amd64
      - leg-postgres-windows-amd64
      - leg-python-darwin-amd64
      - leg-python-darwin-arm64
      - leg-python-linux-amd64
      - leg-python-windows-amd64
      - leg-redis-darwin-amd64
      - leg-redis-darwin-arm64
      - leg-redis-linux-amd64
      - leg-redis-windows-amd64
      - leg-valkey-darwin-amd64
      - leg-valkey-darwin-arm64
      - leg-valkey-linux-amd64
      - leg-valkey-windows-amd64
    if: ${{ !cancelled() && needs.plan.result == 'success' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: manifest-push
    outputs:
      finalizable_artifact_id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      # Reconcile every success leg's component Release, then emit the verified
      # metas. publish_legs downloads each leg BY its immutable artifact id,
      # authenticates it (handoff.verify), and reconciles source-before-object-code
      # immutably. The metas are written BEFORE any red exit so finalize still
      # gets the partial success list; the fail-if-errors gate runs LAST.
      - name: Reconcile Releases and emit the verified-legs handoff
        id: publish
        env:
          GH_TOKEN: ${{ secrets.DEVXDK_MANIFEST_PUSH_TOKEN }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 scripts/publish_legs.py \
            --needs "$NEEDS_JSON" \
            --workdir "$RUNNER_TEMP/legs" \
            --out "$RUNNER_TEMP/finalizable-metas" \
            --github-output "$GITHUB_OUTPUT"
      - name: Upload the finalizable-metas handoff
        id: upload
        if: steps.publish.outputs.has_metas == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: finalizable-metas-${{ github.run_attempt }}
          path: ${{ runner.temp }}/finalizable-metas/
          if-no-files-found: error
      - name: Fail the job on any collected per-leg error
        if: steps.publish.outputs.has_errors == 'true'
        run: |
          echo "::error::publish collected per-leg reconciliation errors (a red, re-runnable job that still handed finalize its partial success list)" >&2
          exit 1

  finalize:
    needs: publish
    # Gate on the nonempty artifact-id ALONE (not publish success): publish goes
    # red on a per-leg error while still emitting a valid partial handoff, and
    # those verified legs must still finalize. An empty/absent id (crash or
    # zero-verified publish) skips finalize at the job level, before it enters
    # the privileged environment.
    if: ${{ !cancelled() && needs.publish.outputs.finalizable_artifact_id != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    environment: manifest-push
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Do NOT persist the read-only GITHUB_TOKEN as an http.extraheader:
          # it would override the PAT URL on `git push` (the job has
          # contents:read, so that push is rejected). With this off, the PAT
          # remote URL set below is the sole push credential.
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Download the finalizable-metas handoff by id
        env:
          GH_TOKEN: ${{ secrets.DEVXDK_MANIFEST_PUSH_TOKEN }}
        run: |
          gh api "repos/devxdk/devxdk/actions/artifacts/${{ needs.publish.outputs.finalizable_artifact_id }}/zip" > "$RUNNER_TEMP/metas.zip"
          mkdir -p "$RUNNER_TEMP/finalizable-metas"
          python3 -c "import sys,zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])" "$RUNNER_TEMP/metas.zip" "$RUNNER_TEMP/finalizable-metas"
      - name: Write pending records, commit, and dispatch scrape-and-sign
        env:
          # The PAT pushes the pending commit to main (contents:write, and it is
          # the ruleset bypass actor); the workflow_dispatch of scrape-and-sign
          # rides the job's own GITHUB_TOKEN (permissions: actions: write above),
          # so the PAT needs only contents:write — dispatching mutates no
          # protected ref.
          PUSH_TOKEN: ${{ secrets.DEVXDK_MANIFEST_PUSH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "devxdk-bot"
          git config user.email "bot@devxdk.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/devxdk/devxdk.git"
          python3 scripts/finalize_builds.py --metas "$RUNNER_TEMP/finalizable-metas"
