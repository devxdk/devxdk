# Build the DevXDK-built/adopted bundles that have no usable upstream binary and
# publish them to this repo's Releases, then queue a pending record so
# scrape-and-sign folds them into the signed manifests.
#
# Four stages: plan resolves the leg map; STATIC per-(component, platform) leg
# jobs (parity-checked against tracked-versions.toml by scripts/plan_builds.py)
# build + smoke + hand off by immutable artifact id; publish reconciles the
# Releases and emits the verified-legs handoff; finalize writes the pending
# records and dispatches scrape-and-sign. The per-component recipes land with
# Phase 1/3 — until then a planned leg fails loudly (recipes/leg.sh).
#
# permissions: {} at the workflow level; each job takes only what it needs.
# All Release/tag/pending mutation rides DEVXDK_MANIFEST_PUSH_TOKEN from the
# main-only manifest-push environment (W3), never GITHUB_TOKEN.

name: build-runtimes

on:
  workflow_dispatch:
    inputs:
      components:
        description: "Comma-separated component filter (empty = all enabled)"
        type: string
        default: ""
      platforms:
        description: "Comma-separated platform filter, e.g. windows/amd64"
        type: string
        default: ""
      version:
        description: "Pin this version instead of resolving newest (single-component dispatches)"
        type: string
        default: ""
      force:
        description: "Rebuild at the next unused -rN revision even when up to date"
        type: boolean
        default: false
      dry_run:
        description: "Plan, build, and smoke only — no Release/pending mutation"
        type: boolean
        default: true
  schedule:
    - cron: "0 3 * * 1" # Mon 03:00 UTC, before the 06:00 scrape

permissions: {}

concurrency:
  group: build-runtimes
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      legs: ${{ steps.plan.outputs.legs }}
      map: ${{ steps.plan.outputs.map }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Resolve the leg map
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          COMPONENTS: ${{ inputs.components }}
          PLATFORMS: ${{ inputs.platforms }}
          VERSION: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
        run: |
          # Static-job parity re-asserted at run time: never emit a leg no
          # caller job would consume (a silent gap under success-only reads).
          python3 scripts/plan_builds.py --check-parity .github/workflows/build-runtimes.yml
          ARGS=(--leg-map-json)
          [ -n "$COMPONENTS" ] && ARGS+=(--components "$COMPONENTS")
          [ -n "$PLATFORMS" ] && ARGS+=(--platforms "$PLATFORMS")
          [ -n "$VERSION" ] && ARGS+=(--version "$VERSION")
          [ "$FORCE" = "true" ] && ARGS+=(--force)
          map=$(python3 scripts/plan_builds.py "${ARGS[@]}")
          echo "map=$map" >> "$GITHUB_OUTPUT"
          echo "legs=$(printf '%s' "$map" | python3 -c 'import json,sys;print(json.dumps(sorted(json.load(sys.stdin))))')" >> "$GITHUB_OUTPUT"
          printf '%s' "$map" | python3 -m json.tool

  leg-nginx-darwin-amd64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'nginx-darwin-amd64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: nginx-darwin-amd64
      runner: macos-15-intel
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['nginx-darwin-amd64']) }}

  leg-nginx-darwin-arm64:
    needs: plan
    permissions:
      contents: read
    if: ${{ contains(fromJSON(needs.plan.outputs.legs), 'nginx-darwin-arm64') }}
    uses: ./.github/workflows/build-runtime-leg.yml
    with:
      leg: nginx-darwin-arm64
      runner: macos-15
      items: ${{ toJSON(fromJSON(needs.plan.outputs.map)['nginx-darwin-arm64']) }}

  leg-nginx-linux-amd64:
