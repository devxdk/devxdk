# DevXDK manifest — tracked component versions and build pins.
#
# The SINGLE SOURCE OF TRUTH for the build/scrape pipeline. Every scraper,
# builder, and validator reads this file; nothing hardcodes a component list.
#
# Structure:
#   [components.<name>]                  kind = "runtime" | "service"
#   [components.<name>.lines.<id>]       channel, retain_per_line, platforms,
#                                        optional retired = true
#     platforms = { "<goos>/<goarch>" = { type, provider, epoch? }, ... }
#
# A platform entry's `type` says where its asset comes from:
#   scrape — pinned directly at an upstream URL (upstream publishes the hash).
#   adopt  — an upstream binary re-hosted by REFERENCE (self-hash + smoke, no
#            rebuild); its ordering key is the provider's source version.
#   build  — a DevXDK-built/repackaged artifact published to this repo's
#            Releases; its ordering key is the integer DevXDK revision.
# `provider` is a STABLE identity (distinct from the mutable recipe/runner
# details). A provider change, or a build<->adopt flip, is an explicit epoch
# bump in the same commit (absent epoch = 1).
#
# `line` is the scrape/retention bucket (a monotonic floor + `retain_per_line`
# eviction). For services it matches the app's data-compatibility line (major,
# or major.minor for mariadb); for stateless components it is just the series.
#
# [pins] holds the source/toolchain hashes the Phase-1/3 build recipes verify
# against. Every value is concrete and reviewed — a bump is a normal PR.

schema = 1

# ---- Scraped runtimes (official per-platform binaries; upstream publishes hashes)

[components.go]
kind = "runtime"
[components.go.lines."1"]
channel = "stable"
retain_per_line = 1
platforms = { "windows/amd64" = { type = "scrape", provider = "golang" }, "linux/amd64" = { type = "scrape", provider = "golang" }, "darwin/amd64" = { type = "scrape", provider = "golang" }, "darwin/arm64" = { type = "scrape", provider = "golang" } }

[components.node]
kind = "runtime"
[components.node.lines."24"]
channel = "lts"
retain_per_line = 1
platforms = { "windows/amd64" = { type = "scrape", provider = "nodejs" }, "linux/amd64" = { type = "scrape", provider = "nodejs" }, "darwin/amd64" = { type = "scrape", provider = "nodejs" }, "darwin/arm64" = { type = "scrape", provider = "nodejs" } }

[components.composer]
kind = "runtime"
# Phase 0 hosts a hand-seeded release; Phase 2 folds composer into scrape.py
# (getcomposer.org/versions for discovery + the per-version .sha256sum file).
[components.composer.lines."2"]
channel = "stable"
retain_per_line = 1
platforms = { "any" = { type = "scrape", provider = "getcomposer" } }

# ---- Services (scraped where an upstream binary exists, else DevXDK-built)

[components.mariadb]
kind = "service"
# Scraped from downloads.mariadb.org's REST API (publishes sha256); durable URLs
# on archive.mariadb.org. 11.8 is the lts channel (the RecommendedPreset default;
# 11.8.8 was promoted stable->lts by a one-shot revocation), so the newer rolling
# 12.3 stable line is safe to track above it — the preset prefers the newest lts.
# 11.4/10.11/10.6 stay stable (installable, never the default). sources/mariadb.py
# LINES is parity-checked against these entries.
[components.mariadb.lines."12.3"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "mariadb" }, "linux/amd64" = { type = "scrape", provider = "mariadb" } }
[components.mariadb.lines."11.8"]
channel = "lts"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "mariadb" }, "linux/amd64" = { type = "scrape", provider = "mariadb" } }
[components.mariadb.lines."11.4"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "mariadb" }, "linux/amd64" = { type = "scrape", provider = "mariadb" } }
[components.mariadb.lines."10.11"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "mariadb" }, "linux/amd64" = { type = "scrape", provider = "mariadb" } }
[components.mariadb.lines."10.6"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "mariadb" }, "linux/amd64" = { type = "scrape", provider = "mariadb" } }

[components.nginx]
kind = "service"
# Windows = official nginx.org zip (scrape); Unix = DevXDK source build (Phase 3).
[components.nginx.lines."1.30"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "scrape", provider = "nginx" }, "linux/amd64" = { type = "build", provider = "devxdk-nginx-unix" }, "darwin/amd64" = { type = "build", provider = "devxdk-nginx-unix" }, "darwin/arm64" = { type = "build", provider = "devxdk-nginx-unix" } }

# ---- DevXDK-built runtimes/services (no usable upstream binary)

[components.php]
kind = "runtime"
# Windows = repackaged official build + PECL DLLs; Unix = static-php-cli source
# build. Each PHP minor is its own line (extensions are ABI-locked per minor).
[components.php.lines."8.5"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "build", provider = "devxdk-php-windows" }, "linux/amd64" = { type = "build", provider = "devxdk-php-spc" }, "darwin/amd64" = { type = "build", provider = "devxdk-php-spc" }, "darwin/arm64" = { type = "build", provider = "devxdk-php-spc" } }
[components.php.lines."8.4"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "build", provider = "devxdk-php-windows" }, "linux/amd64" = { type = "build", provider = "devxdk-php-spc" }, "darwin/amd64" = { type = "build", provider = "devxdk-php-spc" }, "darwin/arm64" = { type = "build", provider = "devxdk-php-spc" } }

[components.python]
kind = "runtime"
# astral python-build-standalone on every platform (adopt: self-hash + smoke).
[components.python.lines."3.14"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "adopt", provider = "astral" }, "linux/amd64" = { type = "adopt", provider = "astral" }, "darwin/amd64" = { type = "adopt", provider = "astral" }, "darwin/arm64" = { type = "adopt", provider = "astral" } }

[components.postgres]
kind = "service"
# theseus-rs binaries on every platform (adopt: sha256 published via .sha256
# sidecars, native builds including aarch64 macOS — no EDB re-hosting needed).
# Manifest version = MAJOR.MINOR.
[components.postgres.lines."18"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "adopt", provider = "theseus" }, "linux/amd64" = { type = "adopt", provider = "theseus" }, "darwin/amd64" = { type = "adopt", provider = "theseus" }, "darwin/arm64" = { type = "adopt", provider = "theseus" } }

[components.redis]
kind = "service"
# DevXDK-built on every platform (public recipes = AGPL source-offer compliance).
[components.redis.lines."8"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "build", provider = "devxdk-redis-msys2" }, "linux/amd64" = { type = "build", provider = "devxdk-redis-unix" }, "darwin/amd64" = { type = "build", provider = "devxdk-redis-unix" }, "darwin/arm64" = { type = "build", provider = "devxdk-redis-unix" } }

[components.valkey]
kind = "service"
[components.valkey.lines."9"]
channel = "stable"
retain_per_line = 3
platforms = { "windows/amd64" = { type = "build", provider = "devxdk-valkey-msys2" }, "linux/amd64" = { type = "build", provider = "devxdk-valkey-unix" }, "darwin/amd64" = { type = "build", provider = "devxdk-valkey-unix" }, "darwin/arm64" = { type = "build", provider = "devxdk-valkey-unix" } }

# tablex is deferred for v1 (tablex.json stays releases: []); no tracked lines.
# php-fpm is served by the php bundle (FollowsRuntime); php-fpm.json is never
# downloaded and has no tracked lines.

